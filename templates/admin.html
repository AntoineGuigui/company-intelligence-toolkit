<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Admin — Field Clustering</title>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --red: #C8102E; --dark: #1A1A2E; --dark-card: #2A2A48; --border: #3A3A5C; --text: #F0F0F5; --text-muted: #6E6E8A; --success: #2ECC71; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--dark); color: var(--text); min-height: 100vh; }
        .header { background: linear-gradient(135deg, var(--red) 0%, #9B0A20 100%); padding: 20px 40px; display: flex; align-items: center; justify-content: space-between; }
        .header h1 { font-size: 1.4rem; color: #fff; } .header a { color: #fff; text-decoration: none; opacity: 0.8; } .header a:hover { opacity: 1; }
        .container { max-width: 1200px; margin: 0 auto; padding: 24px; }
        .section-title { font-size: 0.75rem; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--text-muted); margin: 24px 0 12px; }
        .merge-panel { background: var(--dark-card); border: 1px solid var(--border); border-radius: 12px; padding: 24px; margin-bottom: 24px; }
        .merge-panel h3 { margin-bottom: 16px; font-size: 1.1rem; }
        .field-grid { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; max-height: 300px; overflow-y: auto; padding: 8px; border: 1px solid var(--border); border-radius: 8px; }
        .field-chip { padding: 6px 14px; border-radius: 20px; font-size: 0.82rem; cursor: pointer; transition: 0.2s; border: 1px solid var(--border); background: var(--dark); user-select: none; }
        .field-chip:hover { border-color: var(--red); } .field-chip.selected { background: var(--red); border-color: var(--red); color: #fff; }
        .field-chip .count { font-size: 0.7rem; opacity: 0.6; margin-left: 4px; }
        .merge-controls { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
        .merge-input { padding: 10px 14px; background: var(--dark); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 0.9rem; flex: 1; min-width: 200px; }
        .merge-input:focus { outline: none; border-color: var(--red); }
        .btn { padding: 10px 20px; border: none; border-radius: 8px; font-size: 0.9rem; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .btn-red { background: var(--red); color: #fff; } .btn-red:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(200,16,46,0.4); } .btn-red:disabled { opacity: 0.4; cursor: not-allowed; }
        .btn-outline { background: none; border: 1px solid var(--border); color: var(--text-muted); } .btn-outline:hover { border-color: var(--red); color: var(--text); }
        .merges-table { width: 100%; border-collapse: collapse; }
        .merges-table th { text-align: left; padding: 10px 14px; font-size: 0.75rem; letter-spacing: 1px; text-transform: uppercase; color: var(--text-muted); border-bottom: 1px solid var(--border); }
        .merges-table td { padding: 10px 14px; border-bottom: 1px solid var(--border); font-size: 0.88rem; }
        .undo-btn { background: none; border: 1px solid var(--border); color: var(--text-muted); padding: 4px 10px; border-radius: 6px; cursor: pointer; font-size: 0.8rem; } .undo-btn:hover { border-color: var(--red); color: var(--red); }
        .toast { position: fixed; bottom: 24px; right: 24px; padding: 14px 24px; background: var(--dark-card); border: 1px solid var(--success); border-radius: 8px; color: var(--text); font-size: 0.9rem; opacity: 0; transform: translateY(20px); transition: 0.25s; z-index: 200; }
        .toast.visible { opacity: 1; transform: translateY(0); } .toast.error { border-color: var(--red); }
        .arrow { color: var(--red); font-weight: 700; }
    </style>
</head>
<body>
<div class="header"><h1>Field Clustering — Admin</h1><a href="/">← Retour au générateur</a></div>
<div class="container">
    <div class="merge-panel"><h3>Sélectionnez les domaines à fusionner</h3><p class="section-title">Cliquez pour sélectionner, puis donnez un nom commun</p><div class="field-grid" id="fieldGrid"></div><div class="merge-controls"><input type="text" class="merge-input" id="canonicalInput" placeholder="Nom canonique (ex: Missiles)"><button class="btn btn-red" id="mergeBtn" disabled onclick="mergeSelected()">Fusionner la sélection</button><button class="btn btn-outline" onclick="clearSelection()">Tout désélectionner</button></div></div>
    <p class="section-title">Fusions manuelles en cours</p>
    <div class="merge-panel"><table class="merges-table"><thead><tr><th>Domaine original</th><th></th><th>Fusionné sous</th><th></th></tr></thead><tbody id="mergesBody"></tbody></table><p id="noMerges" style="color:var(--text-muted);padding:16px;text-align:center;">Aucune fusion manuelle pour l'instant</p></div>
</div>
<div class="toast" id="toast"></div>
<script>
    let allFields=[],selectedFields=new Set();
    async function loadFields(){const r=await fetch("/api/field_clusters");const d=await r.json();allFields=d.fields||[];renderGrid();renderMerges();}
    function renderGrid(){const g=document.getElementById("fieldGrid");g.innerHTML="";[...allFields].sort((a,b)=>a.original.localeCompare(b.original)).forEach(f=>{const c=document.createElement("div");c.className="field-chip"+(selectedFields.has(f.original)?" selected":"");c.innerHTML=f.manual_cluster+(f.original!==f.manual_cluster?' <span style="opacity:0.5">('+f.original+')</span>':'')+' <span class="count">×'+f.count+'</span>';c.onclick=()=>toggleField(f.original,f.manual_cluster);g.appendChild(c);});}
    function toggleField(o,d){if(selectedFields.has(o))selectedFields.delete(o);else{selectedFields.add(o);const i=document.getElementById("canonicalInput");if(!i.value)i.value=d;}renderGrid();document.getElementById("mergeBtn").disabled=selectedFields.size<2;}
    function clearSelection(){selectedFields.clear();document.getElementById("canonicalInput").value="";document.getElementById("mergeBtn").disabled=true;renderGrid();}
    async function mergeSelected(){const c=document.getElementById("canonicalInput").value.trim();if(!c){showToast("Entrez un nom canonique",true);return;}if(selectedFields.size<2){showToast("Sélectionnez au moins 2 domaines",true);return;}const r=await fetch("/api/merge_fields",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({fields:Array.from(selectedFields),canonical_name:c})});const d=await r.json();if(d.success){showToast(d.message,false);clearSelection();loadFields();}else showToast(d.error||"Erreur",true);}
    function renderMerges(){const b=document.getElementById("mergesBody"),n=document.getElementById("noMerges");b.innerHTML="";const m=allFields.filter(f=>f.original!==f.manual_cluster);if(!m.length){n.style.display="block";return;}n.style.display="none";m.forEach(f=>{const t=document.createElement("tr");t.innerHTML='<td>'+f.original+'</td><td class="arrow">→</td><td>'+f.manual_cluster+'</td><td><button class="undo-btn" onclick="undoMerge(\''+f.original+'\')">Annuler</button></td>';b.appendChild(t);});}
    async function undoMerge(f){const r=await fetch("/api/unmerge_field",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({field:f})});const d=await r.json();if(d.success){showToast("Fusion annulée",false);loadFields();}}
    function showToast(m,e){const t=document.getElementById("toast");t.textContent=m;t.className="toast visible"+(e?" error":"");setTimeout(()=>{t.className="toast";},3000);}
    loadFields();
</script>
</body>
</html>
